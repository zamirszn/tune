name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tune

    env:
      GRADLE_USER_HOME: ~/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('tune/**/*.gradle', 'tune/**/*.gradle.kts', 'tune/**/gradle-wrapper.properties', 'tune/**/gradle.properties', 'tune/**/settings.gradle', 'tune/**/settings.gradle.kts', 'tune/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable Gradle cache
        run: echo "org.gradle.caching=true" >> gradle.properties

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel --daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tune-debug-apk
          if-no-files-found: error
          compression-level: 0
          path: |
            app/build/outputs/apk/debug/*.apk
